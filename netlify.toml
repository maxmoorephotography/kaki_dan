[build]
  publish = "."

[[redirects]]
  from = "/checkout"
  to = "/payments/spike/checkout.html"
  status = 200

[[redirects]]
  from = "/checkout/success"
  to = "/payments/spike/success.html"
  status = 200

[[redirects]]
  from = "/checkout/cancel"
  to = "/payments/spike/cancel.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
